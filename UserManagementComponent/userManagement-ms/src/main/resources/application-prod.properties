# Production Configuration for Azure Deployment
spring.application.name=userManagement-ms

# Server configuration for Azure
server.port=${PORT:8080}

# Azure SQL Database configuration
# Replace with your Azure SQL Database connection details
spring.datasource.url=${AZURE_DATABASE_URL:jdbc:sqlserver://your-azure-sql-server.database.windows.net:1433;database=AngularDb;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30}
spring.datasource.username=${AZURE_DATABASE_USERNAME:your-username}
spring.datasource.password=${AZURE_DATABASE_PASSWORD:your-password}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Disable SQL logging in production
spring.jpa.show-sql=false

# Logging configuration for production
logging.level.root=INFO
logging.level.com.dai.userManagement_ms=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Spring Security configuration
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}
