# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - userManagement-ms

on:
  push:
    branches:
      - with_.env_files
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean install
        working-directory: ./UserManagementComponent/userManagement-ms

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: './UserManagementComponent/userManagement-ms/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
      
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'userManagement-ms'
          slot-name: 'Production'
          package: './java-app/userManagement-ms-0.0.1-SNAPSHOT.jar'

          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_A5266B39BE6647119A991F8FE47D430F }}


